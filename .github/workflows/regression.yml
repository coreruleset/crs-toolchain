name: Regression Tests

# default token permissions: none
permissions: {}

on:
  push:
    branches:
      - main
  # Currently, there doesn't appear to be a simple solution for
  # having required checks with ignored paths (the checks will
  # never run and so PRs cannot be merged).
  #   paths-ignore:
  #     - "**/*.md"
  #     - "LICENSE"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  #   paths-ignore:
  #     - "**/*.md"
  #     - "LICENSE"

jobs:
  test:
    strategy:
      matrix:
        go-version: [1.25.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Tests and coverage
        run: go test -cover ./...
        env:
          # self-updater tests make requests to the GitHub API
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
